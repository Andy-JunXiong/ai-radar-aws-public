repos:
  - repo: local
    hooks:
      - id: skill-export-check
        name: Check prompt-skill sync
        entry: python scripts/run_skill_export_check.py
        language: system
        pass_filenames: false
        always_run: true
        files: ^backend/app/prompts/(registry|skill_meta)\.py$
      - id: public-english-only
        name: Enforce English-only public content
        entry: python scripts/check_public_english.py
        language: system
        pass_filenames: false
        always_run: true
